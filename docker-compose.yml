version: '3.8'

services:
  php:
    build: .
    container_name: short_url_php
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - db
    command: >
      sh -c "
        if [ ! -f config/db.php ]; then
          echo 'Copying db.php.example to config/db.php...'
          cp config/db.php.example config/db.php
        else
          echo 'config/db.php already exists, skipping copy.'
        fi &&
        echo 'Starting PHP-FPM...' &&
        docker-php-entrypoint php-fpm
      "

  nginx:
    image: nginx:alpine
    container_name: short_url_nginx
    ports:
      - "8585:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mariadb:10.3
    container_name: short_url_db
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: short_url_db
      MARIADB_USER: short_url_user
      MARIADB_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: